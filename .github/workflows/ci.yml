# CI (docs/roadmap.md P0 #5). wasm/lib is gitignored (artifacts are built
# at `npm pack` time via prepack, never committed), so every job starts by
# building the WASM module from the C sources with a pinned emsdk -- which
# also means every run verifies sources and JS wrapper agree. Two suites:
#   node:    the full node suite, including the real OPFS code paths
#            (node-opfs shims navigator.storage in Node).
#   browser: the *.browser.test.js suite under Playwright Chromium -- real
#            Workers, real OPFS sync access handles, real navigator.locks.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
        with:
          # Keep in lockstep with wasm/build-wasm.sh's header comment.
          version: 5.0.7
      - run: npm ci
      - run: ./wasm/build-wasm.sh
      - run: npm test

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7
      - run: npm ci
      - run: ./wasm/build-wasm.sh
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
